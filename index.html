<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>CEO Command Center – EatSwada</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; color: #f8fafc; padding: 24px; padding-bottom: 80px; -webkit-tap-highlight-color: transparent; }
    
    .header { margin-bottom: 32px; border-bottom: 1px solid #1e293b; padding-bottom: 16px; }
    .header h1 { font-size: 24px; font-weight: 900; color: #38bdf8; letter-spacing: -0.5px; }
    .header p { font-size: 13px; color: #94a3b8; margin-top: 4px; font-weight: 600; }

    .card { background: #1e293b; border: 1px solid #334155; border-radius: 16px; padding: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-bottom: 24px; }
    .card-title { font-size: 16px; font-weight: 900; color: #38bdf8; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    
    .input-group { margin-bottom: 20px; }
    .input-group label { display: block; font-size: 11px; font-weight: 800; color: #94a3b8; text-transform: uppercase; margin-bottom: 8px; letter-spacing: 0.5px; }
    
    .input-field, select { 
      width: 100%; background: #0f172a; border: 1px solid #334155; border-radius: 10px; 
      padding: 14px; font-size: 14px; color: #f8fafc; outline: none; font-family: inherit; font-weight: 600;
    }
    .input-field:focus, select:focus { border-color: #38bdf8; }

    .btn { width: 100%; background: #38bdf8; color: #0f172a; padding: 16px; border: none; border-radius: 10px; font-size: 15px; font-weight: 900; margin-top: 12px; font-family: inherit; cursor: pointer; transition: 0.2s; }
    .btn:active { transform: scale(0.98); }

    .btn-green { background: #10b981; color: #fff; }

    #imagePreview, #resImagePreview { width: 100%; height: 160px; border-radius: 10px; background: #0f172a; border: 1px dashed #334155; margin-bottom: 20px; object-fit: cover; display: none; }

    /* LIVE MENU VIEWER STYLES */
    .menu-list { display: flex; flex-direction: column; gap: 12px; }
    .menu-row { display: flex; align-items: center; justify-content: space-between; background: #0f172a; padding: 12px; border-radius: 12px; border: 1px solid #334155; }
    .menu-row img { width: 48px; height: 48px; border-radius: 8px; object-fit: cover; border: 1px solid #1e293b; }
    .menu-row-info { flex: 1; margin-left: 12px; }
    .menu-row-title { font-size: 14px; font-weight: 800; color: #f8fafc; margin-bottom: 4px; }
    .menu-row-price { font-size: 12px; color: #94a3b8; font-weight: 600; }
    .btn-delete { background: rgba(220, 38, 38, 0.1); color: #ef4444; border: 1px solid rgba(220, 38, 38, 0.2); padding: 10px 14px; border-radius: 8px; font-size: 14px; font-weight: 800; cursor: pointer; transition: 0.2s; }
    .btn-delete:active { background: #dc2626; color: #fff; }

    #ceo-overlay { position: fixed; inset: 0; background: #0f172a; z-index: 900; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 32px; }
  </style>
</head>
<body>

  <div id="ceo-overlay">
    <i class="fa-solid fa-shield-halved" style="font-size:56px; color:#38bdf8; margin-bottom:20px;"></i>
    <h2 style="font-size:24px; font-weight:900; margin-bottom:8px; color:#f8fafc;">Admin Access Required</h2>
    <p style="color:#94a3b8; font-weight:600; margin-bottom:32px; line-height:1.5;">You do not have CEO privileges to view the Master Catalog.</p>
    <button id="btn-make-ceo" onclick="executeCEOUpgrade()" style="background:#38bdf8; color:#0f172a; border:none; padding:18px 24px; border-radius:14px; font-size:16px; font-weight:900; width:100%;">Grant Me God-Mode (CEO)</button>
  </div>

  <div class="header">
    <h1>EatSwada Command</h1>
    <p>Master Catalog Injection & Control System</p>
  </div>

  <div class="card" style="border-color: #10b981;">
    <div class="card-title" style="color:#10b981;"><i class="fa-solid fa-store"></i> Step 1: Create New Restaurant</div>
    
    <div class="input-group">
      <label>Restaurant Name</label>
      <input type="text" id="resName" class="input-field" placeholder="e.g. Biryani Zone">
    </div>

    <div class="input-group">
      <label>Cuisine Type</label>
      <input type="text" id="resCuisine" class="input-field" placeholder="e.g. Biryani, Mughlai">
    </div>

    <div class="input-group">
      <label>High-Res Cover Image URL</label>
      <input type="url" id="resImage" class="input-field" placeholder="Paste image link here" oninput="previewResImage()">
    </div>
    <img id="resImagePreview" src="" alt="Preview">

    <button class="btn btn-green" id="btnCreateRes" onclick="createNewRestaurant()">Create Restaurant</button>
  </div>

  <div class="card">
    <div class="card-title"><i class="fa-solid fa-plus"></i> Step 2: Inject Food Item</div>
    <div class="input-group">
      <label>1. Assign to Restaurant</label>
      <select id="restaurantSelect" onchange="loadCurrentMenu()">
        <option value="">Loading restaurants...</option>
      </select>
    </div>

    <div class="input-group">
      <label>2. Premium Item Name</label>
      <input type="text" id="itemName" class="input-field" placeholder="e.g. Authentic Chicken Dum Biryani">
    </div>

    <div class="input-group">
      <label>3. Default Price (₹)</label>
      <input type="number" id="itemPrice" class="input-field" placeholder="e.g. 250">
    </div>

    <div class="input-group">
      <label>4. Dietary Type</label>
      <select id="itemVeg">
        <option value="true">Vegetarian (Green)</option>
        <option value="false">Non-Vegetarian (Red)</option>
      </select>
    </div>

    <div class="input-group">
      <label>5. High-Res Image URL</label>
      <input type="url" id="itemImage" class="input-field" placeholder="Paste image link here" oninput="previewImage()">
    </div>
    
    <img id="imagePreview" src="" alt="Preview">

    <button class="btn" id="uploadBtn" onclick="injectMasterItem()">Inject into Live Menu</button>
  </div>

  <div class="card">
    <div class="card-title"><i class="fa-solid fa-list"></i> Current Live Menu</div>
    <div id="current-menu-grid">
       <p style="color:#94a3b8; font-size:13px; font-weight:600; text-align:center; padding: 20px 0;">Select a restaurant above to view and control their menu.</p>
    </div>
  </div>

  <script>
    async function loadRestaurants() {
      const token = localStorage.getItem('token') || localStorage.getItem('nearbite_token');
      if (!token) { alert("Please log into the main app first!"); return; }

      try {
        const response = await fetch('https://eatswada.onrender.com/api/admin/restaurants', {
          headers: { 'Authorization': `Bearer ${token}` }
        });

        if (response.status === 403) { document.getElementById('ceo-overlay').style.display = 'flex'; return; }
        if (!response.ok) { alert("Backend Error: Cannot load restaurants."); return; }

        const result = await response.json();

        if (result.success) {
          document.getElementById('ceo-overlay').style.display = 'none';
          const select = document.getElementById('restaurantSelect');
          
          if(result.data.length === 0) {
             select.innerHTML = '<option value="">⚠️ No Restaurants Created Yet!</option>';
          } else {
             select.innerHTML = '<option value="">-- Select a Restaurant --</option>';
             result.data.forEach(res => { select.innerHTML += `<option value="${res._id}">${res.name}</option>`; });
          }
        }
      } catch (err) { alert("Network Error"); }
    }

    // 🚨 BRAND NEW: CREATE RESTAURANT LOGIC 🚨
    async function createNewRestaurant() {
      const name = document.getElementById('resName').value.trim();
      const cuisine = document.getElementById('resCuisine').value.trim();
      const image = document.getElementById('resImage').value.trim() || 'https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?w=800&q=80';
      const token = localStorage.getItem('token') || localStorage.getItem('nearbite_token');
      const btn = document.getElementById('btnCreateRes');

      if (!name || !cuisine) { alert("Please enter Restaurant Name and Cuisine!"); return; }

      btn.innerText = "Creating..."; btn.disabled = true;

      try {
        // You already have a public route to create restaurants in your backend!
        const response = await fetch('https://eatswada.onrender.com/api/restaurants', {
          method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
          // We attach a dummy user ID as owner just to make the backend happy
          body: JSON.stringify({ name, cuisineDisplay: cuisine, image, address: "Maynaguri", rating: 4.5, isActive: true })
        });
        
        if (response.ok) {
           alert("Restaurant Created Successfully! It is now live on your main website.");
           document.getElementById('resName').value = ''; document.getElementById('resCuisine').value = '';
           document.getElementById('resImage').value = ''; document.getElementById('resImagePreview').style.display = 'none';
           loadRestaurants(); // Reload the dropdown!
        } else { alert("Creation failed."); }
      } catch (err) { alert("Network error."); }

      btn.innerText = "Create Restaurant"; btn.disabled = false;
    }

    function previewResImage() {
      const url = document.getElementById('resImage').value;
      const img = document.getElementById('resImagePreview');
      if (url.length > 10) { img.src = url; img.style.display = 'block'; } else { img.style.display = 'none'; }
    }

    async function loadCurrentMenu() {
      const restaurantId = document.getElementById('restaurantSelect').value;
      const grid = document.getElementById('current-menu-grid');

      if (!restaurantId) { grid.innerHTML = '<p style="color:#94a3b8; font-size:13px; font-weight:600; text-align:center; padding: 20px 0;">Select a restaurant above to view and control their menu.</p>'; return; }

      grid.innerHTML = '<p style="color:#38bdf8; font-size:13px; font-weight:800; text-align:center; padding: 20px 0;"><i class="fa-solid fa-spinner fa-spin"></i> Fetching live data...</p>';
      const token = localStorage.getItem('token') || localStorage.getItem('nearbite_token');

      try {
        const response = await fetch(`https://eatswada.onrender.com/api/admin/menu/${restaurantId}`, { headers: { 'Authorization': `Bearer ${token}` } });
        const result = await response.json();

        if (response.ok && result.success) {
           if (result.data.length === 0) { grid.innerHTML = '<p style="color:#94a3b8; font-size:13px; font-weight:600; text-align:center; padding: 20px 0;">This restaurant currently has 0 items.</p>'; return; }

           grid.innerHTML = '<div class="menu-list">' + result.data.map(item => `
             <div class="menu-row">
               <img src="${item.image || 'https://images.unsplash.com/photo-1546069901-ba9599a7e63c'}" alt="Food">
               <div class="menu-row-info">
                 <div class="menu-row-title">${item.name}</div>
                 <div class="menu-row-price">₹${item.price} • ${item.inStock ? '<span style="color:#10b981;">Active</span>' : '<span style="color:#dc2626;">Hidden</span>'}</div>
               </div>
               <button class="btn-delete tap" onclick="deleteItem('${item._id}')"><i class="fa-solid fa-trash-can"></i></button>
             </div>
           `).join('') + '</div>';
        }
      } catch (e) { grid.innerHTML = '<p style="color:#ef4444; font-size:13px; font-weight:800; text-align:center;">Failed to load database.</p>'; }
    }

    async function deleteItem(itemId) {
      if(!confirm("⚠️ WARNING: Are you sure you want to permanently delete this item from the database?")) return;
      const token = localStorage.getItem('token') || localStorage.getItem('nearbite_token');
      try {
         const response = await fetch(`https://eatswada.onrender.com/api/admin/menu/${itemId}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } });
         if(response.ok) { alert("Item permanently deleted."); loadCurrentMenu(); }
      } catch(e) { alert("Network Error: Could not delete."); }
    }

    function previewImage() {
      const url = document.getElementById('itemImage').value;
      const img = document.getElementById('imagePreview');
      if (url.length > 10) { img.src = url; img.style.display = 'block'; } else { img.style.display = 'none'; }
    }

    async function injectMasterItem() {
      const restaurantId = document.getElementById('restaurantSelect').value;
      const name = document.getElementById('itemName').value;
      const price = document.getElementById('itemPrice').value;
      const isVeg = document.getElementById('itemVeg').value === 'true';
      const image = document.getElementById('itemImage').value || 'https://images.unsplash.com/photo-1546069901-ba9599a7e63c';

      if (!restaurantId || !name || !price) { alert("Please fill out the Restaurant, Name, and Price!"); return; }

      const token = localStorage.getItem('token') || localStorage.getItem('nearbite_token');
      const btn = document.getElementById('uploadBtn');
      btn.innerText = "Injecting..."; btn.disabled = true;

      try {
        const response = await fetch('https://eatswada.onrender.com/api/admin/menu', {
          method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
          body: JSON.stringify({ restaurantId, name, price, isVeg, image, category: 'General', inStock: true })
        });

        if (response.ok) {
           alert("Master Item Injected! The vendor will now see it.");
           document.getElementById('itemName').value = ''; document.getElementById('itemPrice').value = '';
           document.getElementById('itemImage').value = ''; document.getElementById('imagePreview').style.display = 'none';
           loadCurrentMenu();
        } else { alert("Upload failed. Access Denied."); }
      } catch (err) { alert("Network error."); }

      btn.innerText = "Inject into Live Menu"; btn.disabled = false;
    }

    async function executeCEOUpgrade() {
        const token = localStorage.getItem('token') || localStorage.getItem('nearbite_token');
        const btn = document.getElementById('btn-make-ceo');
        btn.innerText = "Upgrading..."; btn.disabled = true;

        try {
            const res = await fetch('https://eatswada.onrender.com/api/make-me-ceo', { method: 'POST', headers: { 'Authorization': `Bearer ${token}` } });
            const data = await res.json();
            if (data.success) {
                alert("Success! You are now the CEO."); document.getElementById('ceo-overlay').style.display = 'none'; loadRestaurants();
            } else { alert("Upgrade failed."); btn.innerText = "Grant Me God-Mode (CEO)"; btn.disabled = false; }
        } catch(e) { alert("Network Error"); btn.innerText = "Grant Me God-Mode (CEO)"; btn.disabled = false; }
    }

    document.addEventListener('DOMContentLoaded', loadRestaurants);
  </script>
</body>
</html>
